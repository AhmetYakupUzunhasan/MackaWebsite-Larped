{{define "templates/admin/media.html"}}
{{template "admin_shell_start" .}}
<section class="media-layout">
  <section class="panel admin-form-panel">
    <p class="eyebrow">Yeni Yükleme</p>
    <h2>Medya ekle</h2>
    <form method="post" enctype="multipart/form-data" class="stack-form">
      <label>Başlık<input type="text" name="title"></label>
      <label>Alt metin<input type="text" name="alt_tr"></label>
      <label>Dosya<input type="file" name="file" required></label>
      <button class="btn btn-primary" type="submit">Dosyayı yükle</button>
    </form>
  </section>
  <section class="panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">Kütüphane</p>
        <h2>Yüklü görseller</h2>
      </div>
    </div>
    <div class="media-grid">
      {{range .Media}}
      <article class="media-card">
        <img src="{{mediaURL .FileName}}" alt="{{.AltTR}}">
        <strong>{{.Title}}</strong>
        <span>#{{.ID}} • {{.OriginalName}}</span>
        <form method="post" action="/admin/media/delete">
          <input type="hidden" name="id" value="{{.ID}}">
          <button class="btn btn-secondary" type="submit">Sil</button>
        </form>
      </article>
      {{else}}
      <p>Henüz medya yüklenmedi.</p>
      {{end}}
    </div>
  </section>
</section>
{{template "admin_shell_end" .}}
{{end}}
