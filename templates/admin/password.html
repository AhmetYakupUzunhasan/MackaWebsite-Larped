{{define "templates/admin/password.html"}}
{{template "admin_shell_start" .}}
<form method="post" class="stack-form">
  <section class="panel admin-form-panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">Güvenlik</p>
        <h2>Yönetici şifresini değiştir</h2>
      </div>
    </div>
    {{if .PasswordError}}<div class="flash error">{{.PasswordError}}</div>{{end}}
    <div class="two-col">
      <label>Mevcut şifre<input type="password" name="current_password" autocomplete="current-password" required></label>
      <div></div>
      <label>Yeni şifre<input type="password" name="new_password" autocomplete="new-password" minlength="8" required></label>
      <label>Yeni şifreyi doğrulayın<input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required></label>
    </div>
  </section>
  <div class="admin-actions">
    <a class="btn btn-secondary" href="/admin/">Geri dön</a>
    <button class="btn btn-primary" type="submit">Şifreyi güncelle</button>
  </div>
</form>
{{template "admin_shell_end" .}}
{{end}}
